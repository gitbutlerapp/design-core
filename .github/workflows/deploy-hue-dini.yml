name: Deploy hue-dini

on:
    push:
        branches: [main]
        paths:
            - "tools/hue-dini/**"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
                  cache-dependency-path: tools/hue-dini/pnpm-lock.yaml
            - name: Install dependencies
              run: pnpm install
              working-directory: tools/hue-dini
            - name: Build
              run: pnpm build
              working-directory: tools/hue-dini
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: tools/hue-dini/dist
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
